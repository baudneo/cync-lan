exported_homes:
  # each of these are a "home" in the app. This one is named "Home"
  # work in progress to import several homes and import 'suggested' groups.
  Home:
    # Some Cync Home identifiers.
    id: 123456789
    # identifier passed in device<->server handshakes
    access_key: 123456
    # This is what all Cync BT devices will broadcast as their name after joining this home.
    # When you do a BT scan, you'll see a bunch of devices with this name.
    mac: ABCDEF1234567890

    devices:
      # this is the device id
      1:
        name: Office Lamp
        # 'enabled: no' will disable the device, it will not be reported to hass. (Default: yes)
        enabled: yes
        # mac is the BT MAC, used in HASS MQTT device page and as a unique identifier. REQUIRED
        mac: 78:6D:EB:28:EA:A4
        # WiFi mac is used in HASS MQTT device page, but not as a unique identifier because BT only devices have this set to 00:01:02:03:04:05.
        wifi_mac: 78:6D:EB:28:EA:A5
        # Cloud stores firmware version as it was at the time of adding the device
        # you'll need to edit this if your device receives firmware updates to reflect this data in HASS MQTT device page.
        # This is important for device type 133 (LED light strip controller)
        fw: 1.3.160
        # cync device type, CRITICAL that this is present and correct as it determines what the device is
        # and what capabilities it has: white temp adjustable, RGB, dimmable, kelvin range, etc.
        type: 147
        # Think of this in HASS terms and an endpoint is an entity. You can have multiple entities per device
        # like the outdoor dual outlet plug.
        endpoints:
          0: Office Lamp
        # any other key besides the ones above are not parsed
        # the below keys are only for user reference
        description: Cync Full color direct connect decorative edison bulb (Globe)
        ip: 10.0.3.20
      2:
        name: Overhead Right
        mac: 78:6D:EB:28:EA:40
        wifi_mac: 78:6D:EB:28:EB:40
        fw: 1.3.160
        type: 147
      3:
        name: Overhead Left
        mac: 78:6D:EB:28:D6:D1
        wifi_mac: 78:6D:EB:28:D6:D2
        fw: 1.3.160
        type: 147
      4:
        name: Living Room Plug
        mac: 34:13:43:70:D7:5E
        wifi_mac: 34:13:43:78:D9:2E
        type: 68
        fw: 1.0.298
      5:
        name: Living Room Motion Dimmer
        mac: 34:13:43:70:D8:A4
        wifi_mac: 34:13:43:78:D9:A4
        type: 37
        fw: 1.0.072
        description: Dimmer with Motion and Ambient Light Sensor
        # motion / lux are NOT exposed, email cync and ask them to expose it in the phone app and to google home / alexa,
        # DO NOT mention this project to them. If they expose it in the phone app, it should also have device status broadcasts that we can listen to.

      # Example of a device that is unsupported due to being a wire free (battery powered) switch
      # this device will not be exposed or controllable even if set to enabled: yes.
      6:
        name: Wire Free Dimmer 1
        enabled: yes
        mac: 78:6D:EB:30:88:1D
        wifi_mac: 00:01:02:03:04:05
        type: 113
        fw: 2.3.054
        description: on/off, brightness, white temperature, BT, battery (NOT SUPPORTED) wire free dimmer switch